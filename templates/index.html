<!DOCTYPE html>
<html>
<head>
    <title>LSTM Tweet Sentiment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h2>Twitter Sentiment Analysis (LSTM)</h2>
        <form method="POST">
            <textarea name="tweet" placeholder="Enter tweet..." required></textarea><br>
            <button type="submit">Predict</button>
        </form>
        {% if prediction %}
            <h3>Prediction: {{ prediction }}</h3>
        {% endif %}
    </div>
</body>
</html>
