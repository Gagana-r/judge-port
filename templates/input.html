<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Sentiment - Judge Port</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #fff5f5; color: #1a1a1a; }
        nav { background-color: #8b0000; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #ffcccb; }
        h2 { text-align: center; margin-top: 30px; color: #b22222; }
        .container { max-width: 500px; margin: 40px auto; background: #ffe5e5; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical; }
        input[type="submit"] { width: 100%; padding: 10px; background-color: #cc0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; }
        input[type="submit"]:hover { background-color: #990000; }
        .logout { display: block; text-align: center; margin-top: 15px; color: #8b0000; text-decoration: none; font-weight: bold; }
        .logout:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/logout">Logout</a>
</nav>
<div class="container">
    <h2>Sentiment Prediction</h2>
    <form method="post">
        <label>Enter your comment or tweet</label>
        <textarea name="tweet" rows="5" placeholder="Type your comment here..." required></textarea>
        <input type="submit" value="Predict Sentiment">
    </form>
    <a class="logout" href="/logout">Logout</a>
</div>
</body>
</html>
