<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Judge Port</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #fff5f5; color: #1a1a1a; }
        nav { background-color: #8b0000; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #ffcccb; }
        h2 { text-align: center; margin-top: 30px; color: #b22222; }
        .container { max-width: 500px; margin: 40px auto; background: #ffe5e5; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button, input[type="submit"] { width: 100%; padding: 10px; background-color: #cc0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; }
        button:hover, input[type="submit"]:hover { background-color: #990000; }
        .msg { text-align: center; color: red; font-weight: bold; margin-top: 10px; }
        .links { text-align: center; margin-top: 15px; }
        .links a { color: #8b0000; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/signup">Sign Up</a>
    <a href="/login">Login</a>
    <a href="/about">About</a>
</nav>
<div class="container">
    <h2>Login</h2>
    <form method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
        <input type="submit" value="Login">
    </form>
    <p class="msg">{{ msg }}</p>
    <div class="links">
        <a href="/forget">Forgot Password?</a> &nbsp;|&nbsp;
        <a href="/signup">Don't have an account? Sign Up</a>
    </div>
</div>
</body>
</html>
